<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Form</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:#f4f4f4;
    }

    .login-container{
        width:350px;
        background:white;
        padding:30px;
        border-radius:10px;
        box-shadow:0 0 15px rgba(0,0,0,0.2);
    }

    h2{
        text-align:center;
        margin-bottom:20px;
    }

    label{
        display:block;
        margin-top:12px;
        font-weight:bold;
    }

    input{
        width:100%;
        padding:10px;
        margin-top:5px;
        border:1px solid #ccc;
        border-radius:5px;
    }

    .options{
        display:flex;
        justify-content:space-between;
        margin-top:10px;
        font-size:14px;
    }

    .options input{
        width:auto;
    }

    button{
        width:100%;
        padding:10px;
        margin-top:20px;
        border:none;
        border-radius:5px;
        background:green;
        color:white;
        font-size:16px;
        cursor:pointer;
    }

    button:hover{
        background:darkgreen;
    }

    .register{
        text-align:center;
        margin-top:15px;
        font-size:14px;
    }

    a{
        text-decoration:none;
    }
</style>
</head>

<body>

<div class="login-container">
    <h2>Login Form</h2>

    <form>

        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>

        <label>Password</label>
        <input type="password" placeholder="Enter your password" required>

        <div class="options">
            <label>
                <input type="checkbox"> Remember Me
            </label>

            <a href="#">Forgot Password?</a>
        </div>

        <button type="submit">Login</button>

        <div class="register">
            Don't have an account?
            <a href="#">Register</a>
        </div>

    </form>
</div>

</body>
</html>
